<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>anime, written in the stars 🍄</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap');

:root{
--cream: #FBF3E6;
--pink: #F6C9C6;
--pink-deep: #E89A9A;
--brown: #8A6552;
--brown-dark: #5C4636;
--mush-red: #B5433D;
--line: #3B2E27;
}
*{ box-sizing: border-box; }
body{
margin:0; min-height:100vh;
background:
radial-gradient(circle at 15% 20%, rgba(246,201,198,0.55) 0, transparent 40%),
radial-gradient(circle at 85% 75%, rgba(181,67,61,0.12) 0, transparent 45%),
var(--cream);
font-family:'Nunito', sans-serif;
color: var(--brown-dark);
display:flex; flex-direction:column; align-items:center;
padding: 40px 18px 80px; overflow-x:hidden;
}
.hearts{ position:fixed; inset:0; pointer-events:none; z-index:0; }
.hearts span{ position:absolute; font-size: 18px; opacity:0.35; animation: float 9s ease-in-out infinite; }
@keyframes float{ 0%,100%{ transform: translateY(0) rotate(0deg);} 50%{ transform: translateY(-22px) rotate(8deg);} }

header{ text-align:center; max-width: 640px; position:relative; z-index:1; margin-bottom: 26px; }
h1{
font-family:'Baloo 2', cursive; font-size: clamp(26px, 5vw, 40px);
color: var(--mush-red); margin: 0 0 8px;
text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
}
header p{ font-size: 15px; color: var(--brown); margin:0; }

.card{
background: #fff; border: 3px solid var(--line); border-radius: 28px;
box-shadow: 6px 6px 0 var(--pink-deep); padding: 26px;
max-width: 500px; width:100%; position:relative; z-index:1;
}

label{
display:block; font-family:'Baloo 2', cursive; font-size: 14px;
margin: 14px 0 6px; color: var(--brown-dark);
}
input{
width:100%; padding: 10px 12px; border: 2px solid var(--brown);
border-radius: 14px; font-family:'Nunito', sans-serif; font-size: 15px;
background: var(--cream); color: var(--brown-dark);
}
input:focus{ outline: 2px solid var(--mush-red); }

.btn-row{ display:flex; gap:10px; margin-top: 20px; }
button{
font-family:'Baloo 2', cursive; font-size: 15px; cursor:pointer;
border: 2px solid var(--line); border-radius: 16px; padding: 12px 16px;
transition: transform 0.15s ease;
}
button:hover{ transform: translateY(-2px); }
#findBtn{ background: var(--mush-red); color:#fff; flex:1; }
#rerollBtn{ background: var(--pink); color: var(--brown-dark); display:none; }

#result{ margin-top: 24px; display:none; }
#result.show{ display:block; animation: pop 0.35s ease; }
@keyframes pop{ from{ transform: scale(0.9); opacity:0;} to{ transform: scale(1); opacity:1;} }

.result-title{ font-family:'Baloo 2', cursive; font-size: 21px; color: var(--mush-red); margin: 0 0 4px; }
.result-sub{ font-size: 13px; color: var(--brown); margin: 0 0 16px; font-style: italic; }

.anime-item{
background: var(--cream); border: 2px dashed var(--pink-deep);
border-radius: 18px; padding: 16px 18px;
}
.anime-item h3{ font-family:'Baloo 2', cursive; margin: 0 0 6px; font-size: 19px; color: var(--brown-dark); }
.anime-item p{ margin:0; font-size: 14px; line-height: 1.45; }

.tag{
display:inline-block; font-family:'Baloo 2', cursive; font-size: 12px;
background: var(--brown); color:#fff; padding: 3px 10px; border-radius: 10px;
margin-bottom: 10px;
}

footer{ margin-top: 30px; font-size: 12px; color: var(--brown); opacity:0.7; position:relative; z-index:1; }
</style>
</head>
<body>

<div class="hearts" id="heartsLayer"></div>

<header>
<h1>anime, written in the stars 🍄</h1>
<p>your exact birth date + time picks the show. reroll for a different one.</p>
</header>

<div class="card">
<label for="bdate">birth date</label>
<input type="date" id="bdate">

<label for="btime">birth time</label>
<input type="time" id="btime">

<div class="btn-row">
<button id="findBtn">find my anime ✨</button>
<button id="rerollBtn">reroll 🎲</button>
</div>

<div id="result">
<span class="tag" id="signTag"></span>
<p class="result-sub" id="resultSub"></p>
<div class="anime-item">
<h3 id="animeTitle"></h3>
<p id="animeWhy"></p>
</div>
</div>
</div>

<footer>made with too many heart emojis 💌</footer>

<script>
// ---- zodiac ranges (month, day) ----
const zodiacRanges = [
{ sign: "capricorn", glyph:"♑", end:[1,19] },
{ sign: "aquarius", glyph:"♒", end:[2,18] },
{ sign: "pisces", glyph:"♓", end:[3,20] },
{ sign: "aries", glyph:"♈", end:[4,19] },
{ sign: "taurus", glyph:"♉", end:[5,20] },
{ sign: "gemini", glyph:"♊", end:[6,20] },
{ sign: "cancer", glyph:"♋", end:[7,22] },
{ sign: "leo", glyph:"♌", end:[8,22] },
{ sign: "virgo", glyph:"♍", end:[9,22] },
{ sign: "libra", glyph:"♎", end:[10,22] },
{ sign: "scorpio", glyph:"♏", end:[11,21] },
{ sign: "sagittarius",glyph:"♐", end:[12,21] },
{ sign: "capricorn", glyph:"♑", end:[12,31] }
];

function getZodiac(month, day){
for(const z of zodiacRanges){
const [m,d] = z.end;
if(month < m || (month === m && day <= d)) return z;
}
return zodiacRanges[zodiacRanges.length-1];
}

// ---- anime pools (5+ per sign so reroll actually changes things) ----
const zodiacData = {
aries: { sub:"you want the fight scene in episode one, no slow burn", shows:[
{ title:"Kill la Kill", why:"loud, chaotic, never once takes its foot off the gas — exactly your energy." },
{ title:"My Hero Academia", why:"a scrappy underdog who charges in headfirst. you'd get along." },
{ title:"Gurren Lagann", why:"the most 'main character energy' show ever animated." },
{ title:"Fire Force", why:"flashy powers, zero patience for slow starts. built for you." },
{ title:"Baki", why:"pure, unfiltered aggression as a personality trait. very on brand." }
]},
taurus: { sub:"cozy, beautiful, and worth savoring slowly", shows:[
{ title:"Spy x Family", why:"warm and domestic in the best way — comfort food for your soul." },
{ title:"Food Wars!", why:"you understand that good food is a love language." },
{ title:"Mushishi", why:"slow, gorgeous, meditative. built for someone who doesn't rush." },
{ title:"Barakamon", why:"quiet island life pacing that lets you actually breathe." },
{ title:"Laid-Back Camp", why:"nothing bad happens for 12 episodes. your nervous system will thank you." }
]},
gemini: { sub:"witty, fast-talking, never boring for a second", shows:[
{ title:"Ouran High School Host Club", why:"sharp banter and social chaos — you'll quote it within a week." },
{ title:"The Disastrous Life of Saiki K.", why:"deadpan, rapid-fire, constantly bouncing between bits." },
{ title:"Great Teacher Onizuka", why:"loud, clever, impossible to predict." },
{ title:"Nisekoi", why:"juggling like six plotlines at once. very gemini multitasking energy." },
{ title:"Bakuman", why:"two brains bouncing ideas off each other nonstop." }
]},
cancer: { sub:"emotional, nostalgic, will make you cry on purpose", shows:[
{ title:"Clannad: After Story", why:"the ultimate cancer test. bring tissues, bring your whole heart." },
{ title:"Violet Evergarden", why:"tender, aching, about learning to feel again." },
{ title:"March Comes in Like a Lion", why:"quiet found-family healing arcs, your favorite genre." },
{ title:"Anohana", why:"grief and childhood friendship rendered devastatingly soft." },
{ title:"Wolf Children", why:"a whole show about the ache of raising who you love." }
]},
leo: { sub:"main character, obviously, no notes", shows:[
{ title:"One Piece", why:"a swaggering, loyal crew led by someone who refuses to be ignored." },
{ title:"Kaguya-sama: Love is War", why:"dramatic, theatrical, constantly performing — you'll feel seen." },
{ title:"Fire Force", why:"big powers, bigger presence, main character lighting." },
{ title:"Blue Lock", why:"an entire show about wanting to be the one and only star." },
{ title:"Yuri!!! on Ice", why:"gorgeous, glittering, built for the spotlight. like you." }
]},
virgo: { sub:"detail-obsessed plots that reward paying attention", shows:[
{ title:"Death Note", why:"meticulous and cerebral — rewards someone who notices every clue." },
{ title:"Mob Psycho 100", why:"surprisingly thoughtful about self-improvement and quiet discipline." },
{ title:"Fullmetal Alchemist: Brotherhood", why:"structured, precise, morally rigorous." },
{ title:"Erased", why:"a mystery that punishes you for missing a single detail." },
{ title:"Psycho-Pass", why:"clinical, systematic, endlessly analytical. your kind of world." }
]},
libra: { sub:"aesthetic, romantic, a little indecisive (affectionately)", shows:[
{ title:"Fruits Basket", why:"gorgeous, gentle, all about balance and relationships." },
{ title:"Your Lie in April", why:"beautiful visuals and a love story almost too pretty to handle." },
{ title:"Toradora!", why:"will-they-won't-they done exactly the way a libra wants it drawn out." },
{ title:"Kaguya-sama: Love is War", why:"two people who can't just say how they feel. relatable." },
{ title:"Given", why:"soft, aching, and quietly one of the prettiest romances out there." }
]},
scorpio: { sub:"dark, intense, a little obsessive — as it should be", shows:[
{ title:"Tokyo Ghoul", why:"brooding, intense, morally tangled. scorpio catnip." },
{ title:"Monster", why:"slow-burning psychological dread that never lets go." },
{ title:"Jujutsu Kaisen", why:"grim stakes and characters who mean every word twice." },
{ title:"Parasyte -the maxim-", why:"body horror wrapped around an identity crisis. very scorpio." },
{ title:"Vinland Saga", why:"vengeance as a personality trait, until it isn't." }
]},
sagittarius: { sub:"adventure-first, rules-optional", shows:[
{ title:"Made in Abyss", why:"reckless curiosity dragging you somewhere beautiful and terrifying." },
{ title:"Cowboy Bebop", why:"wandering, freewheeling, never sitting still." },
{ title:"Hunter x Hunter", why:"exploration and open-world energy, chasing what's over the horizon." },
{ title:"Space Dandy", why:"a guy who wanders the galaxy for fun. no plan, no problem." },
{ title:"Kino's Journey", why:"never stays anywhere long enough to get bored. very you." }
]},
capricorn: { sub:"ambitious leads who claw their way to the top", shows:[
{ title:"Attack on Titan", why:"relentless and strategic — about earning every inch of ground." },
{ title:"Vinland Saga", why:"a slow, disciplined redemption arc built on hard-won growth." },
{ title:"Code Geass", why:"cold, calculated ambition with a plan five steps ahead." },
{ title:"Legend of the Galactic Heroes", why:"empire-building patience. a capricorn's fantasy." },
{ title:"Ping Pong the Animation", why:"quiet, grinding self-discipline disguised as a sports anime." }
]},
aquarius: { sub:"weird on purpose, ahead of the curve", shows:[
{ title:"Neon Genesis Evangelion", why:"existential and strange, refuses to be a normal mecha show." },
{ title:"Paranoia Agent", why:"surreal and unpredictable in a way only an aquarius appreciates." },
{ title:"FLCL", why:"chaotic, symbolic, borderline unhinged. built for your brain." },
{ title:"Serial Experiments Lain", why:"digital existentialism before it was cool. you'd have called it first." },
{ title:"Mononoke", why:"visually experimental in a way nothing else on this list is." }
]},
pisces: { sub:"dreamy, soft, quietly devastating", shows:[
{ title:"A Silent Voice", why:"gentle and heartbreaking in equal measure." },
{ title:"Wolf Children", why:"soft, maternal, quietly magical — your kind of fairytale." },
{ title:"Weathering With You", why:"dreamlike visuals and feelings-first storytelling." },
{ title:"Mushishi", why:"drifts like a half-remembered dream. very pisces pacing." },
{ title:"Your Name.", why:"romantic, blurry-edged, and a little bit magic. exactly your speed." }
]}
};

// ---- seeded shuffle so the same birthdate+time gives a consistent-but-varied sequence ----
function hashSeed(str){
let h = 0;
for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
return h;
}
function mulberry32(seed){
return function(){
seed |= 0; seed = seed + 0x6D2B79F5 | 0;
let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
return ((t ^ t >>> 14) >>> 0) / 4294967296;
}
}

let currentSign = null;
let currentPool = [];
let rng = null;
let usedIndexes = [];

function pickNext(){
if(usedIndexes.length === currentPool.length) usedIndexes = []; // reshuffle once exhausted
let idx;
do { idx = Math.floor(rng() * currentPool.length); }
while(usedIndexes.includes(idx));
usedIndexes.push(idx);
return currentPool[idx];
}

function renderPick(){
const show = pickNext();
document.getElementById('animeTitle').textContent = show.title;
document.getElementById('animeWhy').textContent = show.why;
}

document.getElementById('findBtn').addEventListener('click', () => {
const dateVal = document.getElementById('bdate').value;
const timeVal = document.getElementById('btime').value || "00:00";
if(!dateVal) return;

const [year, month, day] = dateVal.split('-').map(Number);
const z = getZodiac(month, day);
currentSign = z.sign;
currentPool = zodiacData[z.sign].shows;

const seedStr = `${dateVal}T${timeVal}`;
rng = mulberry32(hashSeed(seedStr));
usedIndexes = [];

document.getElementById('signTag').textContent = `${z.glyph} ${z.sign[0].toUpperCase() + z.sign.slice(1)}`;
document.getElementById('resultSub').textContent = zodiacData[z.sign].sub;
renderPick();

document.getElementById('result').classList.add('show');
document.getElementById('rerollBtn').style.display = 'inline-block';
});

document.getElementById('rerollBtn').addEventListener('click', renderPick);

// floating background hearts
const heartsLayer = document.getElementById('heartsLayer');
const heartChars = ['💗','🩷','🍄','⭐'];
for(let i=0; i<14; i++){
const s = document.createElement('span');
s.textContent = heartChars[Math.floor(Math.random()*heartChars.length)];
s.style.left = Math.random()*100 + 'vw';
s.style.top = Math.random()*100 + 'vh';
s.style.animationDelay = (Math.random()*6) + 's';
s.style.fontSize = (14 + Math.random()*14) + 'px';
heartsLayer.appendChild(s);
}
</script>

</body>
</html>
